name: Build Sonarr

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/Build-And-Push.yaml
      - ".github/workflows/Sonarr.yml"
      - "Sonarr/**"

jobs:
  release:
    uses: ./.github/workflows/Build-And-Push.yaml
    with:
      app_name: Sonarr
      images: '["sonarr", "radarr", "prowlarr", "ombi"]'
