name: Cleanup old images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'JSON array of image names'
        required: true
        default: '["sonarr", "radarr", "prowlarr", "ombi"]'
        type: string
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image names'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.images) }}
    steps:
      - name: Delete old images (keep last 5 versions)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.service }}
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
