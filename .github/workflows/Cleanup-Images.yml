name: Cleanup old images

on:
  schedule:
    # Hourly drain. GITHUB_TOKEN allows ~1000 API requests/hour per repo, so
    # each run clears up to ~1000 versions across all images and the next run
    # picks up where it left off.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      images:
        description: 'JSON array of image names'
        required: false
        default: '["sonarr", "radarr", "prowlarr", "ombi"]'
        type: string
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image names'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Scheduled runs pass no inputs, so fall back to the full image list.
        service: ${{ fromJson(inputs.images || '["sonarr", "radarr", "prowlarr", "ombi"]') }}
    steps:
      - name: Delete old images (keep the 5 most recent tagged releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: justereseau
          PACKAGE: ${{ matrix.service }}
          KEEP: "5"
        run: |
          set -euo pipefail

          echo "Collecting versions for ${OWNER}/${PACKAGE} ..."
          versions="$(gh api --paginate \
            "/orgs/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" \
            -q '.[] | {id, digest: .name, created_at, tags: (.metadata.container.tags // [])}' \
            | jq -s '.')"
          total="$(jq 'length' <<<"$versions")"
          echo "Found ${total} version(s)"

          # The N most recent *tagged* versions are the releases we keep.
          kept_tags="$(jq -r --argjson keep "$KEEP" \
            '[.[] | select((.tags | length) > 0)] | sort_by(.created_at) | reverse | .[0:$keep][].digest' \
            <<<"$versions")"

          if [ -z "$kept_tags" ]; then
            echo "No tagged versions found; skipping cleanup to avoid wiping the package."
            exit 0
          fi

          # Each tagged release is a multi-arch manifest list that references
          # untagged platform/attestation child manifests. Read each kept
          # manifest from the registry so those children are preserved too.
          reg_token="$(printf '%s' "$GH_TOKEN" | base64 -w0)"
          keep_list="$(mktemp)"
          printf '%s\n' "$kept_tags" >"$keep_list"
          for digest in $kept_tags; do
            curl -fsSL \
              -H "Authorization: Bearer ${reg_token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://ghcr.io/v2/${OWNER}/${PACKAGE}/manifests/${digest}" \
              | jq -r '.manifests[]?.digest // empty' >>"$keep_list"
          done
          sort -u "$keep_list" -o "$keep_list"
          keep_count="$(wc -l <"$keep_list" | tr -d ' ')"
          echo "Keeping ${keep_count} digest(s): tagged releases + their platform/attestation images"

          # Delete every version not in the keep list. Cap at 1000 deletes per
          # run (the GITHUB_TOKEN hourly request budget). On the first HTTP 403
          # the rate limit is spent, so stop and report — this is expected and
          # must NOT fail the job; the next hourly run resumes the backlog.
          max_deletes=1000
          attempts=0
          deleted=0
          while read -r id digest; do
            [ -n "$id" ] || continue
            if grep -qxF "$digest" "$keep_list"; then
              continue
            fi
            if [ "$attempts" -ge "$max_deletes" ]; then
              echo "Reached the ${max_deletes}-delete cap for this run; stopping."
              break
            fi
            attempts=$((attempts + 1))
            if err="$(gh api --method DELETE \
              "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/${id}" 2>&1)"; then
              echo "Deleted ${id} (${digest})"
              deleted=$((deleted + 1))
            elif printf '%s' "$err" | grep -q "HTTP 403"; then
              echo "Hit HTTP 403 (rate limit) after ${deleted} delete(s); stopping this run."
              break
            else
              echo "::warning::Failed to delete version ${id} (${digest}): ${err}"
            fi
          done < <(jq -r '.[] | "\(.id) \(.digest)"' <<<"$versions")

          echo "Done: deleted ${deleted} of ${total} version(s) this run; $((total - deleted)) remain (incl. ${keep_count} kept)."
